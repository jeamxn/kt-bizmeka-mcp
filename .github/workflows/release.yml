name: release

# Build the standalone binaries, package per-platform Claude Code plugin zips,
# and upload everything to the GitHub Release for the pushed tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        run: bun install --frozen-lockfile || bun install

      - name: Build standalone binaries (all platforms)
        run: bun run scripts/build.ts

      - name: Package per-platform plugin zips
        run: python3 scripts/package.py "${{ steps.tag.outputs.tag }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/kt-bizmeka-mcp-darwin-arm64
            dist/kt-bizmeka-mcp-darwin-x64
            dist/kt-bizmeka-mcp-linux-x64
            dist/kt-bizmeka-mcp-linux-arm64
            dist/kt-bizmeka-mcp-windows-x64.exe
            release/kt-bizmeka-plugin-darwin-arm64.zip
            release/kt-bizmeka-plugin-darwin-x64.zip
            release/kt-bizmeka-plugin-linux-x64.zip
            release/kt-bizmeka-plugin-linux-arm64.zip
            release/kt-bizmeka-plugin-windows-x64.zip
