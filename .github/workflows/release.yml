name: release

# On every push to main, cut a calendar-version release: build the standalone
# binaries, package per-platform Claude Code plugin zips, and publish them under
# an auto-generated tag vYYYYMMDD-HHMM (KST). Also runnable manually.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Compute calendar tag (KST)
        id: tag
        run: |
          tag="$(TZ=Asia/Seoul date +'v%Y%m%d-%H%M')"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag}"

      - name: Install deps
        run: bun install --frozen-lockfile || bun install

      - name: Build standalone binaries (all platforms)
        run: bun run scripts/build.ts

      - name: Package per-platform plugin zips
        run: python3 scripts/package.py "${{ steps.tag.outputs.tag }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release/kt-bizmeka-plugin-darwin-arm64.zip
            release/kt-bizmeka-plugin-darwin-x64.zip
            release/kt-bizmeka-plugin-linux-x64.zip
            release/kt-bizmeka-plugin-linux-arm64.zip
            release/kt-bizmeka-plugin-windows-x64.zip
